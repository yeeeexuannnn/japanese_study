<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Background Card -->
  <rect width="480" height="480" rx="96" x="16" y="16" fill="url(#grad)" filter="url(#shadow)" />
  <!-- Japanese Character 'あ' for Hiragana Symbolizing Study -->
  <text x="50%" y="58%" font-family="Outfit, Inter, Roboto, sans-serif" font-size="220" font-weight="900" fill="#1e1e2e" text-anchor="middle" dominant-baseline="middle">
    あ
  </text>
  <!-- A small shiny star in the corner for Bookmarks -->
  <path d="M 400 100 L 405 115 L 420 115 L 408 125 L 412 140 L 400 130 L 388 140 L 392 125 L 380 115 L 395 115 Z" fill="#f9e2af" />
</svg>
